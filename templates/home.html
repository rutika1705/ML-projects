<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Math Score Predictor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 620px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 35px 30px;
            text-align: center;
            color: white;
        }

        .card-header i {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .card-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-header p {
            opacity: 0.85;
            font-size: 0.92rem;
        }

        .card-body {
            padding: 35px 30px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            padding: 11px 15px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background-color: #fafafa;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
            background-color: white;
        }

        .row { margin-bottom: 5px; }

        .btn-predict {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            padding: 14px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }

        .btn-predict:active { transform: translateY(0); }

        .result-box {
            background: linear-gradient(135deg, #f0f4ff, #f8f0ff);
            border: 2px solid #667eea;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            margin-top: 25px;
        }

        .result-box .label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .result-box .score {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .result-box .sublabel {
            font-size: 0.85rem;
            color: #999;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 25px 0;
        }

        .section-title {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #aaa;
            font-weight: 700;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <i class="fas fa-graduation-cap"></i>
            <h1>Student Math Score Predictor</h1>
            <p>Enter student details to predict their math performance</p>
        </div>

        <div class="card-body">
            <form action="{{ url_for('predict_datapoint')}}" method="post">

                <p class="section-title">Student Demographics</p>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option selected disabled value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Race / Ethnicity</label>
                        <select class="form-select" name="ethnicity" required>
                            <option selected disabled value="">Select Ethnicity</option>
                            <option value="group A">Group A</option>
                            <option value="group B">Group B</option>
                            <option value="group C">Group C</option>
                            <option value="group D">Group D</option>
                            <option value="group E">Group E</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Parental Level of Education</label>
                    <select class="form-select" name="parental_level_of_education" required>
                        <option selected disabled value="">Select Parent's Education</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="high school">High School</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Lunch Type</label>
                        <select class="form-select" name="lunch" required>
                            <option selected disabled value="">Select Lunch Type</option>
                            <option value="free/reduced">Free / Reduced</option>
                            <option value="standard">Standard</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Test Preparation</label>
                        <select class="form-select" name="test_preparation_course" required>
                            <option selected disabled value="">Select Course</option>
                            <option value="none">None</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>

                <div class="divider"></div>
                <p class="section-title">Academic Scores</p>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Reading Score (out of 100)</label>
                        <input class="form-control" type="number" name="reading_score"
                            placeholder="e.g. 72" min="0" max="100" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Writing Score (out of 100)</label>
                        <input class="form-control" type="number" name="writing_score"
                            placeholder="e.g. 68" min="0" max="100" required/>
                    </div>
                </div>

                <button type="submit" class="btn-predict">
                    <i class="fas fa-calculator me-2"></i> Predict Math Score
                </button>

            </form>

            {% if results %}
            <div class="result-box">
            <div class="label">Predicted Math Score</div>
            <div class="score">{{ "%.2f"|format(results|float) }}</div>
            <div class="sublabel">out of 100</div>
           </div>
           {% endif %}

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
